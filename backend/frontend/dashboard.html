<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>总览 — 司库资金管理系统</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #f4f6fb; }
    .stat-card { border-left: 4px solid; border-radius: .6rem; }
    .stat-card.blue   { border-color: #0d6efd; }
    .stat-card.green  { border-color: #198754; }
    .stat-card.orange { border-color: #fd7e14; }
    .stat-card.red    { border-color: #dc3545; }
    .stat-value { font-size: 1.6rem; font-weight: 700; }
    .page-section { background: #fff; border-radius: .75rem; box-shadow: 0 1px 6px rgba(0,0,0,.07); }
  </style>
</head>
<body>
<div id="main-nav"></div>

<div class="container-fluid py-4 px-4">

  <!-- 欢迎行 -->
  <div class="d-flex align-items-center justify-content-between mb-4">
    <div>
      <h5 class="fw-bold mb-0" data-testid="welcome-msg">
        你好，<span id="display-username"></span> 👋
      </h5>
      <small class="text-muted" id="display-role"></small>
    </div>
    <button id="refresh-btn" class="btn btn-outline-primary btn-sm" data-testid="refresh-btn">
      🔄 刷新数据
    </button>
  </div>

  <!-- 统计卡片 -->
  <div class="row g-3 mb-4" id="stat-cards">
    <div class="col-6 col-lg-3">
      <div class="card stat-card blue p-3" data-testid="stat-total-balance">
        <div class="text-muted small">账户总余额（CNY）</div>
        <div class="stat-value text-primary" id="stat-balance">—</div>
      </div>
    </div>
    <div class="col-6 col-lg-3">
      <div class="card stat-card green p-3" data-testid="stat-active-accounts">
        <div class="text-muted small">活跃账户数</div>
        <div class="stat-value text-success" id="stat-active">—</div>
      </div>
    </div>
    <div class="col-6 col-lg-3">
      <div class="card stat-card orange p-3" data-testid="stat-pending-payments">
        <div class="text-muted small">待审批付款</div>
        <div class="stat-value text-warning" id="stat-pending">—</div>
      </div>
    </div>
    <div class="col-6 col-lg-3">
      <div class="card stat-card red p-3" data-testid="stat-holding-bills">
        <div class="text-muted small">持有票据</div>
        <div class="stat-value text-danger" id="stat-bills">—</div>
      </div>
    </div>
  </div>

  <div class="row g-3">

    <!-- 账户列表 -->
    <div class="col-12 col-lg-7">
      <div class="page-section p-3 h-100">
        <h6 class="fw-bold mb-3">🏦 银行账户概览</h6>
        <div class="table-responsive">
          <table class="table table-hover align-middle mb-0">
            <thead class="table-light">
              <tr>
                <th>账户号</th>
                <th>开户行</th>
                <th>账户名</th>
                <th class="text-end">余额（CNY）</th>
                <th>状态</th>
              </tr>
            </thead>
            <tbody id="accounts-tbody" data-testid="accounts-table">
              <tr><td colspan="5" class="text-center text-muted py-3">加载中…</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- 近期付款 -->
    <div class="col-12 col-lg-5">
      <div class="page-section p-3 h-100">
        <div class="d-flex justify-content-between align-items-center mb-3">
          <h6 class="fw-bold mb-0">📋 近期付款记录</h6>
          <a href="/frontend/fund.html" class="btn btn-sm btn-outline-primary"
             data-testid="goto-fund-btn">查看全部</a>
        </div>
        <div class="table-responsive">
          <table class="table table-sm align-middle mb-0">
            <thead class="table-light">
              <tr>
                <th>申请号</th>
                <th class="text-end">金额</th>
                <th>状态</th>
              </tr>
            </thead>
            <tbody id="payments-tbody" data-testid="payments-table">
              <tr><td colspan="3" class="text-center text-muted py-3">加载中…</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- 快捷导航 -->
    <div class="col-12">
      <div class="page-section p-3">
        <h6 class="fw-bold mb-3">⚡ 快捷操作</h6>
        <div class="d-flex flex-wrap gap-2">
          <a href="/frontend/fund.html#tab-payment" class="btn btn-primary"
             data-testid="shortcut-apply-payment">＋ 发起付款申请</a>
          <a href="/frontend/fund.html#tab-transfer" class="btn btn-outline-primary"
             data-testid="shortcut-transfer">↔ 资金调拨</a>
          <a href="/frontend/fund.html#tab-receipt" class="btn btn-outline-success"
             data-testid="shortcut-receipt">↓ 收款登记</a>
          <a href="/frontend/bill.html#create" class="btn btn-outline-secondary"
             data-testid="shortcut-create-bill">📄 录入票据</a>
          <a href="/frontend/pool.html#sweep" class="btn btn-outline-info"
             data-testid="shortcut-sweep">🏦 余额归集</a>
        </div>
      </div>
    </div>

  </div><!-- /row -->
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="common.js"></script>
<script>
if (!AUTH.guard()) throw new Error('unauthenticated');

renderNav('dashboard');
document.getElementById('display-username').textContent = AUTH.getUsername();
document.getElementById('display-role').textContent = `角色：${AUTH.getRole()}`;

async function loadAll() {
  const [accRes, payRes, billRes] = await Promise.all([
    GET('/fund/accounts'),
    GET('/fund/payment/list?status=pending'),
    GET('/bill/list?status=holding'),
  ]);

  // ── 账户概览 ──
  if (accRes?.data?.code === 200) {
    const accounts = accRes.data.data;
    const total    = accounts.reduce((s, a) => s + (a.status === 'active' ? a.balance : 0), 0);
    const active   = accounts.filter(a => a.status === 'active').length;

    document.getElementById('stat-balance').textContent = fmtAmount(total);
    document.getElementById('stat-active').textContent  = active;

    document.getElementById('accounts-tbody').innerHTML = accounts.map(a => `
      <tr data-testid="account-row-${a.account_no}">
        <td><code>${a.account_no}</code></td>
        <td>${a.bank_name}</td>
        <td>${a.account_name}</td>
        <td class="text-end fw-semibold">¥ ${fmtAmount(a.balance)}</td>
        <td>${statusBadge(a.status)}</td>
      </tr>`).join('') || emptyRow(5);
  }

  // ── 待审批付款 ──
  if (payRes?.data?.code === 200) {
    const payments = payRes.data.data;
    document.getElementById('stat-pending').textContent = payments.length;

    document.getElementById('payments-tbody').innerHTML = payments.slice(0, 8).map(p => `
      <tr data-testid="payment-row-${p.req_no}">
        <td><span class="text-muted small">${p.req_no.slice(-8)}</span></td>
        <td class="text-end">¥ ${fmtAmount(p.amount)}</td>
        <td>${statusBadge(p.status)}</td>
      </tr>`).join('') || emptyRow(3, '暂无待审批付款');
  }

  // ── 持有票据 ──
  if (billRes?.data?.code === 200) {
    document.getElementById('stat-bills').textContent = billRes.data.data.length;
  }
}

loadAll();
document.getElementById('refresh-btn').addEventListener('click', loadAll);
</script>
</body>
</html>
